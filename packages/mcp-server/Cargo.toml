[package]
name = "loki-mcp-server"
version = "0.1.1"
edition = "2021"

[dependencies]
tokio = { version = "1.38", features = ["full"] }
axum = { version = "0.7", features = ["ws"] }
tower-http = { version = "0.5", features = ["cors", "trace"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"
futures-util = "0.3"
tracing = "0.1"
tracing-subscriber = "0.3"
