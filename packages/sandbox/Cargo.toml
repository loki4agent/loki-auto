[package]
name = "loki-sandbox"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "0.2.92"
wasm-bindgen-futures = "0.4.42"
js-sys = "0.3.69"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
rhai = { version = "1.18.0", features = ["serde", "wasm-bindgen"] }

[dependencies.web-sys]
version = "0.3.69"
features = [
    "Window",
    "Document",
    "Element",
    "HtmlElement",
    "Node",
    "NodeList",
    "console"
]

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"
