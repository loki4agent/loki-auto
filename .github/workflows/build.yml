name: Build MCP Server

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build - ${{ matrix.platform.release_for }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      matrix:
        platform:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: loki-mcp-server
            name: loki-mcp-server-linux-x86_64
            release_for: Linux x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            bin: loki-mcp-server
            name: loki-mcp-server-macos-x86_64
            release_for: macOS x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            bin: loki-mcp-server
            name: loki-mcp-server-macos-aarch64
            release_for: macOS Apple Silicon
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: loki-mcp-server.exe
            name: loki-mcp-server-windows-x86_64.exe
            release_for: Windows x86_64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build binary
        run: cargo build --release --target ${{ matrix.platform.target }} --bin loki-mcp-server

      - name: Prepare binary
        shell: bash
        run: |
          mkdir -p build_artifacts
          if [ "${{ matrix.platform.os }}" = "windows-latest" ]; then
            cp target/${{ matrix.platform.target }}/release/${{ matrix.platform.bin }} build_artifacts/${{ matrix.platform.name }}
          else
            cp target/${{ matrix.platform.target }}/release/${{ matrix.platform.bin }} build_artifacts/${{ matrix.platform.name }}
            chmod +x build_artifacts/${{ matrix.platform.name }}
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.name }}
          path: build_artifacts/${{ matrix.platform.name }}
