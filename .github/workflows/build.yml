name: Build MCP Server

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - "v*"
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build - ${{ matrix.platform.release_for }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      matrix:
        platform:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: loki-mcp-server
            name: loki-mcp-server-linux-x86_64
            release_for: Linux x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            bin: loki-mcp-server
            name: loki-mcp-server-macos-x86_64
            release_for: macOS x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            bin: loki-mcp-server
            name: loki-mcp-server-macos-aarch64
            release_for: macOS Apple Silicon
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: loki-mcp-server.exe
            name: loki-mcp-server-windows-x86_64.exe
            release_for: Windows x86_64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build binary
        run: cargo build --release --target ${{ matrix.platform.target }} --bin loki-mcp-server

      - name: Prepare binary
        shell: bash
        run: |
          mkdir -p build_artifacts
          if [ "${{ matrix.platform.os }}" = "windows-latest" ]; then
            cp target/${{ matrix.platform.target }}/release/${{ matrix.platform.bin }} build_artifacts/${{ matrix.platform.name }}
          else
            cp target/${{ matrix.platform.target }}/release/${{ matrix.platform.bin }} build_artifacts/${{ matrix.platform.name }}
            chmod +x build_artifacts/${{ matrix.platform.name }}
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.name }}
          path: build_artifacts/${{ matrix.platform.name }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: build_artifacts
          merge-multiple: true

      - name: Release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/'))
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest' }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'Latest Build' }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
          files: build_artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
